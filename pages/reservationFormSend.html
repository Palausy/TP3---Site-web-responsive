<!DOCTYPE html>
<html lang="fr-ca">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Restaurant de Burger gourmet 5 étoiles au guide michelin *****"
        />
        <title>Gordon Burger Restaurant</title>
        <link rel="stylesheet" href="../css/normalize.css" />
        <link rel="stylesheet" href="../css/style.css" />
        <link rel="icon" href="../favicon.png" />
    </head>
    <body class="container">
        <header class="flexHead">
            <a class="logo" href="../index.html"
                ><img src="../media/logoGB1.png" alt="logo Gordon burger's" />
            </a>
            <nav>
                <ul>
                    <li>
                        <a href="../index.html">Accueil</a>
                    </li>
                    <li><a href="reservation.html">Réservation</a></li>
                    <li><a href="restaurant.html">Restaurant</a></li>
                    <li><a href="maCommande.html">Ma commande</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <h1>Les Burgers c'est la vie !</h1>
            <h2>RESERVATION</h2>

            <form
                action="../pages/reservationFormSend#formSend.html"
                method="get"
                id="frm-reservation"
            >
                <fieldset>
                    <legend>FORMUBURGER</legend>
                    <div class="contact1">
                        <div>
                            <label for="txt-prenom"
                                >Votre prénom<strong class="red-dot">*</strong>
                                :</label
                            >
                            <input
                                type="text"
                                id="txt-prenom"
                                name="txt-prenom"
                                maxlength="20"
                                required
                            />
                        </div>
                        <div>
                            <label for="txt-nom"
                                >Votre nom<strong class="red-dot">*</strong>
                                :</label
                            >
                            <input
                                type="text"
                                id="txt-nom"
                                name="txt-nom"
                                maxlength="20"
                                required
                            />
                        </div>
                        <div>
                            <label for="txt-num"
                                >Votre numéro<strong class="red-dot">*</strong>
                                :</label
                            ><input
                                type="text"
                                id="txt-num"
                                name="txt-num"
                                minlength="10"
                                maxlength="12"
                                placeholder="514-123-4567"
                                required
                            />
                        </div>
                    </div>

                    <fieldset>
                        <legend>Votre reservation</legend>
                        <div class="contact22">
                            <div class="contact2">
                                <div>
                                    <label for="nbr-quanti"
                                        >Nombre de personnes<strong
                                            class="red-dot"
                                            >*</strong
                                        ></label
                                    >
                                    <input
                                        type="number"
                                        id="nbr-quantite"
                                        name="nbr-quantite"
                                        min="1"
                                        max="8"
                                        required
                                    />
                                </div>
                                <div>
                                    <label for="date-resevatioin"
                                        >Dâte de réservation<strong
                                            class="red-dot"
                                            >*</strong
                                        ></label
                                    >
                                    <input
                                        type="date"
                                        name="date-reservation"
                                        min="2026-03-20"
                                        max="2026-12-31"
                                        required
                                    />
                                </div>
                                <div>
                                    <label for="hours"
                                        >Heures de reservation<strong
                                            class="red-dot"
                                            >*</strong
                                        ></label
                                    >
                                    <select
                                        name="sel-aliment"
                                        id="hours"
                                        required
                                    >
                                        <option value="" selected>
                                            Faire un choix
                                        </option>
                                        <option value="12pm">12 : 00</option>
                                        <option value="12pm30">12 : 30</option>
                                        <option value="13pm">13 : 00</option>
                                        <option value="13pm30">13 : 30</option>
                                        <option value="13pm30">17 : 00</option>
                                        <option value="13pm30">17 : 30</option>
                                        <option value="13pm30">18 : 00</option>
                                        <option value="13pm30">18 : 30</option>
                                        <option value="13pm30">19 : 00</option>
                                        <option value="13pm30">19 : 30</option>
                                        <option value="13pm30">20 : 00</option>
                                        <option value="13pm30">20 : 30</option>
                                        <option value="13pm30">21 : 00</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <fieldset>
                                    <legend>
                                        Ou voulez vous manger
                                        <strong class="red-dot">*</strong>
                                    </legend>

                                    <div>
                                        <input
                                            type="radio"
                                            name="rdo-navigateur"
                                            value="sam"
                                            checked
                                        />
                                        <label for="format-txt"
                                            >Salle a manger
                                        </label>
                                    </div>

                                    <div>
                                        <input
                                            type="radio"
                                            id="firefox"
                                            name="rdo-navigateur"
                                            value="trtr"
                                        />
                                        <label for="format-txt"
                                            >Terrasse
                                        </label>
                                    </div>
                                    <div>
                                        <input
                                            type="radio"
                                            id="sav"
                                            name="rdo-navigateur"
                                            value="frfx"
                                        />
                                        <label for="format-txt"
                                            >Service au volant</label
                                        >
                                    </div>
                                </fieldset>
                            </div>
                        </div>
                    </fieldset>

                    <div>
                        <textarea
                            name="txt-message"
                            id="commantaire"
                            maxlength="250"
                        >
                        </textarea>
                        <label for="txt-message">Commantaire</label>
                    </div>
                    <fieldset>
                        <legend>Contact</legend>
                        <input
                            type="email"
                            id="contct"
                            name="mail-compte"
                            placeholder="adresse@email.com"
                        />
                        <label for="contact">email</label>
                        <input
                            id="ckb-liste"
                            type="checkbox"
                            name="ckb-liste"
                        />
                        <label for="ckb-liste">Infolettre</label>
                    </fieldset>

                    <div>
                        <input type="submit" value="Créer mon compte" />
                    </div>
                </fieldset>
            </form>
            <div id="formSend" class="formSend">
                <p>Confirmation de votre réservation”.</p>
            </div>
        </main>

        <footer id="footerIndex">
            <div class="flexFooter">
                <p>Réaliser par : Jordan Guia</p>
                <div class="footerReseaux">
                    <p>Réseaux sociaux :</p>
                    <a href="../pages/reseaux/facebookReserv.html"
                        ><img src="../media/facebook.png" alt="logo Facebook" />
                    </a>
                    <a href="../pages/reseaux/linkedinReserv.html"
                        ><img src="../media/linkedin.png" alt="logo Linkedin" />
                    </a>
                    <a href="../pages/reseaux/tweeterReserv.html"
                        ><img src="../media/twitter.png" alt="logo tweeter" />
                    </a>
                    <a href="../pages/reseaux/instagramReserv.html"
                        ><img
                            src="../media/instagram.png"
                            alt="logo instagram"
                        />
                    </a>
                </div>
            </div>
            <div class="flexEND">
                <div class="flexFooter2">
                    <p>Integration Web 1</p>
                </div>
                <div class="flexFooter2-1">
                    <p>Cégep Trois-Rivières</p>
                    <p>Hiver 2026</p>
                </div>
            </div>
        </footer>
    </body>
</html>
